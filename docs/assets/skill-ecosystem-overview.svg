      <text x="1273" y="56" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">sf-ai-agentforce-</text>
      <text x="1273" y="76" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">observability</text>

      <rect x="560" y="106" width="360" height="64" rx="20" fill="#FFFFFF" stroke="#DB2777" stroke-width="2"/>
      <text x="740" y="145" text-anchor="middle" fill="#831843" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">sf-ai-agentforce</text>

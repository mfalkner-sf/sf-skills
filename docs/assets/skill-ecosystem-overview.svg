  <rect x="24" y="24" width="1552" height="1132" rx="28" fill="url(#bg)" stroke="#E2E8F0"/>
  <rect x="64" y="64" width="1472" height="92" rx="24" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#shadow)"/>

  <text x="92" y="102" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">SF Skills Ecosystem</text>
  <text x="92" y="132" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="18">A workflow map for choosing the right skill cluster across build, validation, AI, integration, and delivery.</text>

  <g transform="translate(1080 82)">
    <rect x="0" y="0" width="118" height="42" rx="14" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="59" y="27" text-anchor="middle" fill="#3730A3" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">19 skills</text>
  </g>
  <g transform="translate(1212 82)">
    <rect x="0" y="0" width="118" height="42" rx="14" fill="#ECFDF5" stroke="#A7F3D0"/>
    <text x="59" y="27" text-anchor="middle" fill="#065F46" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">7 agents</text>
  </g>
  <g transform="translate(1344 82)">

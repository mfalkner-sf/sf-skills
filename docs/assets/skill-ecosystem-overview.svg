      <text x="390" y="64" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">sf-metadata</text>

      <rect x="620" y="26" width="200" height="64" rx="18" fill="#FFFFFF" stroke="#38BDF8"/>
      <text x="720" y="64" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">sf-data</text>


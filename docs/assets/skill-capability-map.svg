      <text x="260" y="124" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">sf-apex</text>
      <rect x="455" y="88" width="220" height="58" rx="19" fill="#FFFFFF" stroke="#818CF8"/>
      <text x="565" y="124" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">sf-flow</text>
      <rect x="760" y="88" width="220" height="58" rx="19" fill="#FFFFFF" stroke="#818CF8"/>
      <text x="870" y="124" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">sf-lwc</text>
      <rect x="1065" y="88" width="220" height="58" rx="19" fill="#FFFFFF" stroke="#818CF8"/>
      <text x="1175" y="124" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">sf-soql</text>
    </g>
  </g>

  <g transform="translate(60 702)">
    <rect x="0" y="0" width="1480" height="148" rx="24" fill="url(#laneQuality)" stroke="#A3E635"/>
    <text x="28" y="38" fill="#4D7C0F" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1.8">QUALITY</text>
    <text x="28" y="68" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="17">Testing, coverage, and debug feedback loops that reinforce delivery.</text>
    <g filter="url(#softShadow)">

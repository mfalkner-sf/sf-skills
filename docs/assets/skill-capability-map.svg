      <text x="580" y="114" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">sf-testing</text>
      <rect x="820" y="78" width="220" height="58" rx="19" fill="#FFFFFF" stroke="#84CC16"/>
      <text x="930" y="114" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">sf-debug</text>
    </g>
  </g>

  <g transform="translate(60 870)">

    <text x="28" y="38" fill="#4338CA" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1.8">DEVELOPMENT</text>
    <text x="28" y="68" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="17">Core implementation skills for Apex, Flow, LWC, and query design.</text>
    <g filter="url(#softShadow)">

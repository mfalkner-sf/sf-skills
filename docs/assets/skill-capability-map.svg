    <g filter="url(#softShadow)">
      <rect x="115" y="84" width="252" height="58" rx="19" fill="#FFFFFF" stroke="#EC4899"/>
      <text x="241" y="120" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">sf-ai-agentscript</text>
      <rect x="395" y="84" width="270" height="58" rx="19" fill="#FFFFFF" stroke="#EC4899"/>
      <text x="530" y="108" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">sf-ai-agentforce-</text>
      <text x="530" y="128" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">persona</text>
      <rect x="790" y="84" width="290" height="58" rx="19" fill="#FFFFFF" stroke="#EC4899"/>
      <text x="935" y="108" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">sf-ai-agentforce-</text>
      <text x="935" y="128" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">testing</text>
      <rect x="1110" y="84" width="300" height="58" rx="19" fill="#FFFFFF" stroke="#EC4899"/>
      <text x="1260" y="108" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">sf-ai-agentforce-</text>
      <text x="1260" y="128" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">observability</text>
      <rect x="560" y="154" width="360" height="66" rx="21" fill="#FFFFFF" stroke="#DB2777" stroke-width="2"/>
      <text x="740" y="194" text-anchor="middle" fill="#831843" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">sf-ai-agentforce</text>
    </g>
  </g>

  <g transform="translate(60 1110)">
    <rect x="0" y="0" width="1480" height="120" rx="24" fill="url(#laneDevOps)" stroke="#86EFAC"/>
    <text x="28" y="38" fill="#047857" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1.8">DEVOPS &amp; TOOLING</text>
    <text x="28" y="68" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="17">Delivery, architecture communication, and visual documentation workflows.</text>
    <g filter="url(#softShadow)">
      <rect x="280" y="52" width="220" height="58" rx="19" fill="#FFFFFF" stroke="#10B981"/>
      <text x="390" y="88" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">sf-deploy</text>
      <rect x="610" y="52" width="310" height="58" rx="19" fill="#FFFFFF" stroke="#10B981"/>
      <text x="765" y="88" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">sf-diagram-mermaid</text>
      <rect x="1030" y="52" width="360" height="58" rx="19" fill="#FFFFFF" stroke="#10B981"/>
      <text x="1210" y="88" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">sf-diagram-nanobananapro</text>
    </g>
  </g>

  <rect x="64" y="1244" width="1472" height="16" rx="8" fill="#E2E8F0"/>
  <rect x="64" y="1244" width="704" height="16" rx="8" fill="#4F46E5" opacity="0.14"/>
  <rect x="768" y="1244" width="432" height="16" rx="8" fill="#BE185D" opacity="0.14"/>
  <rect x="1200" y="1244" width="336" height="16" rx="8" fill="#059669" opacity="0.14"/>
</svg>

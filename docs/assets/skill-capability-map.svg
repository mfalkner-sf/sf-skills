<svg width="1600" height="1280" viewBox="0 0 1600 1280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SF Skills Capability Map</title>
  <desc id="desc">A capability map of the Salesforce skills ecosystem, grouped into Foundation, Integration, Development, Quality, AI and Automation, and DevOps and Tooling.</desc>

  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1480" y2="1240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFBFF"/>
      <stop offset="1" stop-color="#FFFDF8"/>
    </linearGradient>
    <linearGradient id="laneFoundation" x1="0" y1="0" x2="1480" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0F9FF"/>
      <stop offset="1" stop-color="#E0F2FE"/>
    </linearGradient>
    <linearGradient id="laneIntegration" x1="0" y1="0" x2="1480" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFBEB"/>
      <stop offset="1" stop-color="#FEF3C7"/>
    </linearGradient>
    <linearGradient id="laneDevelopment" x1="0" y1="0" x2="1480" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F7FF"/>
      <stop offset="1" stop-color="#E0E7FF"/>
    </linearGradient>
    <linearGradient id="laneQuality" x1="0" y1="0" x2="1480" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FEE7"/>
      <stop offset="1" stop-color="#ECFCCB"/>
    </linearGradient>
    <linearGradient id="laneAI" x1="0" y1="0" x2="1480" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF1F7"/>
      <stop offset="1" stop-color="#FCE7F3"/>
    </linearGradient>
    <linearGradient id="laneDevOps" x1="0" y1="0" x2="1480" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0FDF4"/>
      <stop offset="1" stop-color="#DCFCE7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%" filterUnits="objectBoundingBox">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%" filterUnits="objectBoundingBox">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.07"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="1552" height="1232" rx="28" fill="url(#bg)" stroke="#E2E8F0"/>
  <rect x="64" y="64" width="1472" height="98" rx="26" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#shadow)"/>

  <text x="92" y="104" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">SF Skills Ecosystem</text>
  <text x="92" y="136" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="18">A capability map for choosing the right skill cluster across build, validation, AI, integration, and delivery.</text>

  <g transform="translate(1062 84)">
    <rect x="0" y="0" width="132" height="44" rx="16" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="66" y="28" text-anchor="middle" fill="#3730A3" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">19 skills</text>
  </g>
  <g transform="translate(1208 84)">
    <rect x="0" y="0" width="132" height="44" rx="16" fill="#ECFDF5" stroke="#A7F3D0"/>
    <text x="66" y="28" text-anchor="middle" fill="#065F46" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">7 agents</text>
  </g>
  <g transform="translate(1354 84)">
    <rect x="0" y="0" width="142" height="44" rx="16" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="71" y="28" text-anchor="middle" fill="#9A3412" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">hooks + LSP</text>
  </g>

  <g transform="translate(60 188)">
    <rect x="0" y="0" width="1480" height="148" rx="24" fill="url(#laneFoundation)" stroke="#7DD3FC"/>
    <text x="28" y="38" fill="#0369A1" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1.8">FOUNDATION</text>
    <text x="28" y="68" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="17">Metadata, data, and access context shared across implementation work.</text>
    <g filter="url(#softShadow)">
      <rect x="270" y="78" width="240" height="58" rx="19" fill="#FFFFFF" stroke="#38BDF8"/>
      <text x="390" y="114" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">sf-metadata</text>
      <rect x="620" y="78" width="200" height="58" rx="19" fill="#FFFFFF" stroke="#38BDF8"/>
      <text x="720" y="114" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">sf-data</text>
      <rect x="930" y="78" width="260" height="58" rx="19" fill="#FFFFFF" stroke="#38BDF8"/>
      <text x="1060" y="114" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">sf-permissions</text>
    </g>
  </g>

  <g transform="translate(60 356)">
    <rect x="0" y="0" width="1480" height="148" rx="24" fill="url(#laneIntegration)" stroke="#FBBF24"/>
    <text x="28" y="38" fill="#B45309" font-family="Avenir Next, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="1.8">INTEGRATION</text>
    <text x="28" y="68" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="17">OAuth, credentials, callouts, events, and external service patterns.</text>
    <g filter="url(#softShadow)">
      <rect x="392" y="78" width="300" height="58" rx="19" fill="#FFFFFF" stroke="#F59E0B"/>
      <text x="542" y="114" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">sf-connected-apps</text>
      <rect x="812" y="78" width="260" height="58" rx="19" fill="#FFFFFF" stroke="#F59E0B"/>
      <text x="942" y="114" text-anchor="middle" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">sf-integration</text>
    </g>
  </g>

  <g transform="translate(60 524)">
